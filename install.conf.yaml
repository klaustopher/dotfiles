- defaults:
    link:
      relink: true

- clean:
    - "~"
    - "~/.config"

- shell:
    - command: sudo ln -sf "$(pwd)/system/sudoers.klaustopher.symlink" /etc/sudoers.d/klaustopher && sudo chown root:$(id -gn root) /etc/sudoers.d/klaustopher
      description: Install sudoers file
      stdout: true
      stderr: true

- create:
    - ~/.config
    - ~/.config/zed
    - ~/.config/ghostty
    - ~/.config/bat
    - ~/.claude
    - ~/Projects
    - ~/.gnupg/

- ifmacos:
    - create:
        - "~/Library/Application Support/VSCodium/User/"

- ifarch:
    - create:
        - "~/.config/VSCodium/User/"

- ifmacos:
    - install-brew: true

- ifmacos:
    - shell:
        - command: brew install gum
          description: Install gum for package selection via Homebrew

- ifarch:
    - shell:
        - command: pacman -Q paru || (sudo pacman -S --needed --noconfirm base-devel git && git clone https://aur.archlinux.org/paru.git /tmp/paru && cd /tmp/paru && makepkg -si --noconfirm)
          description: Install paru AUR helper
          stdout: true
          stderr: true
        - command: sudo pacman -S --needed --noconfirm gum
          description: Install gum for package selection via pacman

- shell:
    - command: packages/select-packages.sh
      description: Select packages to install
      stdout: true
      stderr: true
      stdin: true

- ifmacos:
    - brewfile:
        - packages/Brewfile

- ifarch:
    - shell:
        - command: paru -S --needed --noconfirm $(packages/Archfile)
          description: Install paru packages from Archfile
          stdout: true
          stderr: true

- shell:
    - command: command -v claude || curl -fsSL https://claude.ai/install.sh | bash
      description: Install Claude Code CLI
      stdout: true
      stderr: true

- link:
    ~/.zshrc: zsh/zshrc.symlink
    ~/.gitignore: git/gitignore.symlink
    ~/.gitconfig: git/gitconfig.symlink
    ~/.gitattributes: git/gitattributes.symlink
    ~/.config/nvim: nvim/nvim.symlink
    ~/.irbrc: ruby/irbrc.symlink
    ~/.gemrc: ruby/gemrc.symlink
    ~/.rbenv: ruby/rbenv.symlink
    ~/.ssh/config: openssh/config.symlink
    ~/.config/zed/settings.json: zed/settings.json
    ~/.config/ghostty/config: ghostty/config
    ~/.config/bat/config: bat/config
    ~/.gnupg/gpg-agent.conf: gpg/gpg-agent.conf
    ~/.claude/CLAUDE.md: claude/CLAUDE.md
    ~/.claude/skills: claude/skills
    ~/.claude/agents: claude/agents
    ~/.claude/settings.json:
      path: claude/settings.json
      force: true

- ifmacos:
    - link:
        "~/Library/Application Support/VSCodium/User/settings.json": vs-code/settings.json

- ifarch:
    - link:
        "~/.config/VSCodium/User/settings.json": vs-code/settings.json

- shell:
    - command: vs-code/install-extensions.sh
      description: Install VSCodium extensions (Open VSX + VSIX side-loads)
      stdout: true
      stderr: true

- ifmacos:
    - shell:
        - command: grep -qF "$(brew --prefix)/bin/zsh" /etc/shells || echo "$(brew --prefix)/bin/zsh" | sudo tee -a /etc/shells
          description: Add Homebrew zsh to /etc/shells
        - command: sudo chsh -s $(brew --prefix)/bin/zsh $(whoami)
          description: Switch shell to Homebrew ZSH
          stdout: true
          stderr: true
        - command: /opt/homebrew/bin/gpgconf --kill gpg-agent
          description: Reload GPG agent
        - command: iterm2/download-shell-integration.sh
          description: Install iTerm2 shell integration script
        - command: iterm2/install-profile.sh
          description: Make the profile available in iTerm2
        - command: macos/set-defaults.sh
          description: Set macOS defaults
        - command: macos/install-layout.sh
          description: Install custom keyboard layout

- shell:
    - command: git/create-user-config.sh
      description: Create user config for git
      stdout: true
      stderr: true
      stdin: true

- shell:
    - command: source ~/.zshrc
      description: Reload shell config
